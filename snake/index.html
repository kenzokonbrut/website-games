<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
}
body.light {
  --bg:#f1f5f9;
  --card:#fff;
  --text:#111;
}
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  background:var(--bg);
  color:var(--text);
}
header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
}
canvas {
  background:#000;
  margin-top:20px;
  border-radius:10px;
}
button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body><header>
  <h2>🐍 Snake Game</h2>
  <div>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="goHome()">Home</button>
  </div>
</header><h3>Score: <span id="score">0</span></h3>
<canvas id="game" width="300" height="300"></canvas>
<br>
<button onclick="startGame()">Start / Restart</button><script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let snake, food, dir, score, game;

function toggleTheme() {
  document.body.classList.toggle('light');
}

function goHome() {
  window.location.href = "/";
}

function startGame() {
  snake = [{x:150,y:150}];
  dir = {x:10,y:0};
  food = spawnFood();
  score = 0;
  document.getElementById('score').innerText = score;
  clearInterval(game);
  game = setInterval(loop, 120);
}

function spawnFood() {
  return {
    x: Math.floor(Math.random()*30)*10,
    y: Math.floor(Math.random()*30)*10
  };
}

function loop() {
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // collision
  if (head.x<0||head.y<0||head.x>=300||head.y>=300||
      snake.some(s=>s.x===head.x&&s.y===head.y)) {
    clearInterval(game);
    alert('Game Over! Score: '+score);
    return;
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    score++;
    document.getElementById('score').innerText = score;
    food = spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,300,300);

  // snake
  ctx.fillStyle = '#22c55e';
  snake.forEach(s=>ctx.fillRect(s.x,s.y,10,10));

  // food
  ctx.fillStyle = '#f43f5e';
  ctx.fillRect(food.x,food.y,10,10);
}

window.addEventListener('keydown', e=>{
  if (e.key==='ArrowUp' && dir.y===0) dir={x:0,y:-10};
  if (e.key==='ArrowDown' && dir.y===0) dir={x:0,y:10};
  if (e.key==='ArrowLeft' && dir.x===0) dir={x:-10,y:0};
  if (e.key==='ArrowRight' && dir.x===0) dir={x:10,y:0};
});
</script></body>
</html>
