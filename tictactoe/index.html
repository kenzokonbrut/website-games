<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
  --accent:#38bdf8;
}
body.light {
  --bg:#f1f5f9;
  --card:#fff;
  --text:#111;
}
body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}
header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
}
button {
  padding:8px 12px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}
.container {
  padding:20px;
}
.board {
  display:grid;
  grid-template-columns:repeat(3, 100px);
  gap:10px;
  justify-content:center;
  margin-top:20px;
}
.cell {
  width:100px;
  height:100px;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
  border-radius:10px;
}
.status {
  margin-top:15px;
  font-size:18px;
}
</style>
</head>
<body><header>
  <h2>❌⭕ Tic Tac Toe</h2>
  <div>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="goHome()">Home</button>
  </div>
</header><div class="container">
  <div class="board" id="board"></div>
  <div class="status" id="status">Giliran: X</div>
  <button onclick="resetGame()">Reset</button>
</div><script>
let board = Array(9).fill("");
let current = "X";
let gameOver = false;

function toggleTheme() {
  document.body.classList.toggle('light');
}

function goHome() {
  window.location.href = "/";
}

function render() {
  const el = document.getElementById("board");
  el.innerHTML = "";

  board.forEach((cell, i) => {
    const div = document.createElement("div");
    div.className = "cell";
    div.innerText = cell;
    div.onclick = () => move(i);
    el.appendChild(div);
  });
}

function move(i) {
  if (board[i] || gameOver) return;
  board[i] = current;
  if (checkWin()) {
    document.getElementById("status").innerText = current + " menang!";
    gameOver = true;
  } else if (board.every(x => x)) {
    document.getElementById("status").innerText = "Seri!";
    gameOver = true;
  } else {
    current = current === "X" ? "O" : "X";
    document.getElementById("status").innerText = "Giliran: " + current;
  }
  render();
}

function checkWin() {
  const win = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return win.some(c => c.every(i => board[i] === current));
}

function resetGame() {
  board = Array(9).fill("");
  current = "X";
  gameOver = false;
  document.getElementById("status").innerText = "Giliran: X";
  render();
}

render();
</script></body>
</html>
