<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe Pro</title>
<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
  --accent:#38bdf8;
}
body.light {
  --bg:#f1f5f9;
  --card:#fff;
  --text:#111;
}
body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}
header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
}
button {
  padding:8px 12px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}
.container { padding:20px; }.board { display:grid; grid-template-columns:repeat(3, 100px); gap:10px; justify-content:center; margin-top:20px; } .cell { width:100px; height:100px; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:32px; cursor:pointer; border-radius:10px; transition:0.2s; } .cell:hover { transform:scale(1.1); } .win { background:#22c55e !important; color:#000; } .status { margin-top:15px; font-size:18px; } .score { margin-top:10px; } </style>

</head>
<body><header>
  <h2>❌⭕ Tic Tac Toe Pro</h2>
  <div>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="goHome()">Home</button>
  </div>
</header><div class="container">
  <div class="board" id="board"></div>
  <div class="status" id="status">Giliran: X</div>
  <div class="score">X: <span id="scoreX">0</span> | O: <span id="scoreO">0</span></div>
  <br>
  <button onclick="resetGame()">Reset Round</button>
  <button onclick="resetScore()">Reset Score</button>
</div><script>
let board = Array(9).fill("");
let current = "X";
let gameOver = false;
let scoreX = 0;
let scoreO = 0;

function toggleTheme() {
  document.body.classList.toggle('light');
}

function goHome() {
  window.location.href = "/";
}

function render(winCombo = []) {
  const el = document.getElementById("board");
  el.innerHTML = "";

  board.forEach((cell, i) => {
    const div = document.createElement("div");
    div.className = "cell";
    if (winCombo.includes(i)) div.classList.add("win");
    div.innerText = cell;
    div.onclick = () => move(i);
    el.appendChild(div);
  });
}

function move(i) {
  if (board[i] || gameOver) return;

  board[i] = current;

  const win = checkWin();
  if (win) {
    document.getElementById("status").innerText = current + " menang! 🎉";
    if (current === "X") scoreX++;
    else scoreO++;
    updateScore();
    gameOver = true;
    render(win);
    return;
  }

  if (board.every(x => x)) {
    document.getElementById("status").innerText = "Seri 🤝";
    gameOver = true;
    render();
    return;
  }

  current = current === "X" ? "O" : "X";
  document.getElementById("status").innerText = "Giliran: " + current;
  render();
}

function checkWin() {
  const combos = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for (let c of combos) {
    if (c.every(i => board[i] === current)) return c;
  }
  return null;
}

function updateScore() {
  document.getElementById("scoreX").innerText = scoreX;
  document.getElementById("scoreO").innerText = scoreO;
}

function resetGame() {
  board = Array(9).fill("");
  current = "X";
  gameOver = false;
  document.getElementById("status").innerText = "Giliran: X";
  render();
}

function resetScore() {
  scoreX = 0;
  scoreO = 0;
  updateScore();
}

render();
</script></body>
</html>
