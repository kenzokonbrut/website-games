<!--
Simple Fullstack Portfolio Website
Features:
- Login & Signup (localStorage demo auth)
- Dashboard (list users)
- Profile page
- Live Chat (simple local chat simulation)
- Dark/Light mode toggle

NOTE: This is a frontend-only demo (no real backend). For production, use Node.js + database.
--><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio App</title>
<style>
:root {
  --bg: #ffffff;
  --text: #111;
  --card: #f4f4f4;
}
body.dark {
  --bg: #111;
  --text: #fff;
  --card: #1e1e1e;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  margin: 0;
}
header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: var(--card);
}
button { padding: 8px 12px; cursor: pointer; }
.container { padding: 20px; }
.card {
  background: var(--card);
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
input { display:block; margin:10px 0; padding:8px; width:100%; }
#chatBox { height:200px; overflow:auto; border:1px solid #ccc; padding:10px; }
</style>
</head>
<body>
<header>
  <h2>Portfolio App</h2>
  <div>
    <button onclick="toggleTheme()">Toggle Theme</button>
    <button onclick="logout()">Logout</button>
  </div>
</header><div class="container" id="app"></div><script>
// STORAGE
let users = JSON.parse(localStorage.getItem('users')) || [];
let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;

function save() {
  localStorage.setItem('users', JSON.stringify(users));
}

function setCurrent(user) {
  localStorage.setItem('currentUser', JSON.stringify(user));
  currentUser = user;
}

// THEME
function toggleTheme() {
  document.body.classList.toggle('dark');
}

// ROUTER
function render() {
  if (!currentUser) return showAuth();
  showDashboard();
}

// AUTH UI
function showAuth() {
  app.innerHTML = `
  <div class="card">
    <h3>Login</h3>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
  <div class="card">
    <h3>Sign Up</h3>
    <input id="regUser" placeholder="Username">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
  </div>`;
}

function signup() {
  let u = regUser.value;
  let p = regPass.value;
  if (!u || !p) return alert('Isi semua');
  users.push({ username:u, password:p });
  save();
  alert('Berhasil daftar');
}

function login() {
  let u = loginUser.value;
  let p = loginPass.value;
  let user = users.find(x=>x.username==u && x.password==p);
  if (!user) return alert('Salah');
  setCurrent(user);
  render();
}

function logout() {
  localStorage.removeItem('currentUser');
  currentUser=null;
  render();
}

// DASHBOARD
function showDashboard() {
  app.innerHTML = `
  <div class="card">
    <h3>Welcome ${currentUser.username}</h3>
    <button onclick="showProfile()">Profile</button>
    <button onclick="showUsers()">Data Users</button>
    <button onclick="showChat()">Live Chat</button>
  </div>`;
}

// PROFILE
function showProfile() {
  app.innerHTML = `
  <div class="card">
    <h3>Profile</h3>
    <p>Username: ${currentUser.username}</p>
    <button onclick="render()">Back</button>
  </div>`;
}

// USERS
function showUsers() {
  let list = users.map(u=>`<li>${u.username}</li>`).join('');
  app.innerHTML = `
  <div class="card">
    <h3>All Users</h3>
    <ul>${list}</ul>
    <button onclick="render()">Back</button>
  </div>`;
}

// CHAT
let messages = JSON.parse(localStorage.getItem('chat')) || [];

function showChat() {
  renderChat();
}

function renderChat() {
  let chatHTML = messages.map(m=>`<div><b>${m.user}:</b> ${m.text}</div>`).join('');
  app.innerHTML = `
  <div class="card">
    <h3>Live Chat</h3>
    <div id="chatBox">${chatHTML}</div>
    <input id="chatInput" placeholder="Ketik pesan">
    <button onclick="sendMsg()">Kirim</button>
    <button onclick="render()">Back</button>
  </div>`;
}

function sendMsg() {
  let text = chatInput.value;
  if (!text) return;
  messages.push({ user: currentUser.username, text });
  localStorage.setItem('chat', JSON.stringify(messages));
  renderChat();
}

render();
</script></body>
</html>
