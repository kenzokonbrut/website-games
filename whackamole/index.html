<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack A Mole</title>
<style>
:root { --bg:#0f172a; --card:#1e293b; --text:#fff; }
body.light { --bg:#f1f5f9; --card:#fff; --text:#111; }
body { margin:0; font-family:Arial; text-align:center; background:var(--bg); color:var(--text);} 
header { display:flex; justify-content:space-between; padding:15px; background:var(--card);} 
.container { padding:20px; }
.grid {
  display:grid;
  grid-template-columns:repeat(3, 100px);
  gap:10px;
  justify-content:center;
}
.hole {
  width:100px; height:100px;
  background:#000;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}
.mole { color:#22c55e; }
.bomb { color:#f43f5e; }
button { padding:8px 12px; margin:5px; border:none; border-radius:6px; cursor:pointer; }
</style>
</head>
<body><header>
  <h2>🎯 Whack A Mole</h2>
  <div>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="goHome()">Home</button>
  </div>
</header><div class="container">
  <h3>Score: <span id="score">0</span> | Time: <span id="time">30</span></h3>
  <div class="grid" id="grid"></div>
  <br>
  <button onclick="startGame()">Start</button>
</div><script>
let score=0, time=30, gameInterval, spawnInterval;
let currentIndex = -1;
let bombIndex = -1;

function toggleTheme(){ document.body.classList.toggle('light'); }
function goHome(){ window.location.href = "/"; }

function startGame(){
  score=0; time=30;
  document.getElementById('score').innerText=score;
  document.getElementById('time').innerText=time;

  clearInterval(gameInterval);
  clearInterval(spawnInterval);

  createGrid();

  gameInterval = setInterval(()=>{
    time--;
    document.getElementById('time').innerText=time;
    if(time<=0){
      clearInterval(gameInterval);
      clearInterval(spawnInterval);
      alert('Game Over! Score: '+score);
    }
  },1000);

  spawnInterval = setInterval(spawn,700);
}

function createGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML="";
  for(let i=0;i<9;i++){
    const div = document.createElement('div');
    div.className='hole';
    div.onclick = ()=>hit(i);
    grid.appendChild(div);
  }
}

function spawn(){
  const holes = document.querySelectorAll('.hole');
  holes.forEach(h=>h.innerText="");

  currentIndex = Math.floor(Math.random()*9);
  bombIndex = Math.random()<0.3 ? Math.floor(Math.random()*9) : -1;

  if(bombIndex === currentIndex) bombIndex=-1;

  holes[currentIndex].innerText="🐹";
  holes[currentIndex].classList.add('mole');

  if(bombIndex !== -1){
    holes[bombIndex].innerText="💣";
    holes[bombIndex].classList.add('bomb');
  }
}

function hit(i){
  if(i===currentIndex){
    score++;
  } else if(i===bombIndex){
    score--;
  }
  document.getElementById('score').innerText=score;
}
</script></body>
</html>
